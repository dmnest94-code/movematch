<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>MoveMatch — Request Received</title>
  <link rel="stylesheet" href="/css/styles.css">
  <style>
    body{min-height:100vh;display:grid;place-items:center;padding:24px}
    .success-card{width:min(100%,660px);background:#fff;border:1px solid var(--line);border-radius:28px;padding:44px;text-align:center;box-shadow:var(--shadow)}
    .success-check{width:74px;height:74px;border-radius:50%;display:grid;place-items:center;background:var(--accent);font-size:34px;font-weight:800;margin:0 auto 24px}
    .success-card p{color:var(--muted);font-size:18px}
  </style>
</head>
<body>
  <main class="success-card">
    <div class="success-check">✓</div>
    <h1>Your move plan was received.</h1>
    <p>A MoveMatch specialist will review your request and follow up using the contact details you provided.</p>
    <a class="button button--primary" href="/">Back to MoveMatch</a>
  </main>
</body>
</html>
